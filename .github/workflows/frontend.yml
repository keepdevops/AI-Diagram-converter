# Frontend CI: reproduce the Vite build from the lockfile (catches undeclared-dep
# regressions) and run the Playwright UI tests against the built app.
name: frontend

on:
  push:
    branches: [main, "main-*", "designer-*"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-react
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web-react/package-lock.json

      - name: Install deps (clean, from lockfile)
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: UI tests against the built app
        env:
          SMOKE_URL: http://localhost:5180/
          PW_CHANNEL: ""   # empty -> Playwright's bundled chromium (no system Chrome)
        run: |
          npx vite preview --port 5180 --strictPort &
          SERVER=$!
          for i in $(seq 1 30); do
            curl -fsS -o /dev/null http://localhost:5180/ && break
            sleep 1
          done
          # Focused tests + the broad click-everything smoke (all now required).
          node test/convert.mjs
          node test/designer.mjs
          node test/smoke.mjs
          kill $SERVER 2>/dev/null || true
